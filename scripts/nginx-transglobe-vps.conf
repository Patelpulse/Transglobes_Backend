# HTTP on VPS IP: static Flutter web + `/api` → Node (Transglobe `PORT`, typically 8080).
# Install on server:
#   sudo cp nginx-transglobe-vps.conf /etc/nginx/sites-available/transglobe-ip
#   sudo ln -sf /etc/nginx/sites-available/transglobe-ip /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Web roots (rsync from `flutter build web`):
#   /var/www/transglobe-ip/web/admin/
#   /var/www/transglobe-ip/web/user/
#   /var/www/transglobe-ip/web/driver/
#   /var/www/transglobe-ip/web/corporate/

# Port 8085: avoids conflict with another vhost already using 72.61.172.182:80 (ojas-main).
server {
    listen 8085;
    listen [::]:8085;
    server_name 72.61.172.182;

    root /var/www/transglobe-ip/web;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:8080/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }
    location /user/ {
        try_files $uri $uri/ /user/index.html;
    }
    location /driver/ {
        try_files $uri $uri/ /driver/index.html;
    }
    location /corporate/ {
        try_files $uri $uri/ /corporate/index.html;
    }

    location = / {
        return 302 /user/;
    }
}
