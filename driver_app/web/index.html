<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- Google Sign-In for Flutter Web -->
  <meta name="google-signin-client_id" id="google-signin-client-id"
    content="1072284227316-ep8jv2fj70t5usrodqm813v4lr4jp1sq.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="driver_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>driver_app</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Maps API -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC7SGsD3I7EOEKDh8VXchJGSYz6dnLqM4I&libraries=places&v=weekly"
    async defer></script>

  <!-- Google Identity Services — required by google_sign_in_web to fix MissingPluginException -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Legacy GAPI library for better plugin support -->
  <script src="https://apis.google.com/js/api.js" async defer></script>
</head>

<body>
  <!-- Recaptcha for Phone Auth -->
  <div id="recaptcha-container"></div>
  
  <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-messaging-compat.js"></script>
  <script>
    // Clear stale workers/caches first so old bundled API URLs cannot persist.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          return Promise.all(regs.map(function (reg) {
            return reg.unregister();
          }));
        }).then(function () {
          // Register the latest FCM worker with cache-busting query.
          return navigator.serviceWorker.register("/firebase-messaging-sw.js?v=20260415", {
            updateViaCache: 'none'
          });
        }).catch(function (e) {
          console.warn('Service worker refresh failed:', e);
        });
      });
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
